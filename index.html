<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Wall Charger</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&amp;family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f9fc;
    --surface: #ffffff;
    --surface2: #f1f3f8;
    --border: #e2e8f0;
    --accent: #0088ff;
    --accent2: #00c4b4;
    --text: #1e2937;
    --muted: #64748b;
    --glow: 0 0 20px rgba(0,136,255,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 80px;
  }

  .container {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Header */
  .header {
    text-align: center;
    margin: 20px 0 24px;
  }

  .header .icon {
    font-size: 54px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 12px rgba(0,136,255,0.4));
  }

  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    color: var(--accent);
    letter-spacing: 3px;
    font-weight: 700;
  }

  .header p {
    color: var(--muted);
    font-size: 15px;
  }

  /* Fixed Parameter Card */
  .fixed-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  }

  .card-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 14.5px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap input, .input-wrap select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 17px;
    font-family: 'Space Mono', monospace;
    outline: none;
    transition: all 0.3s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .input-wrap .suffix {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  .slider-container {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }

  .pct-val {
    font-family: 'Space Mono', monospace;
    font-size: 19px;
    color: var(--accent2);
    font-weight: 600;
    min-width: 58px;
    text-align: right;
  }

  /* Tab Menu - Bottom Navigation */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
    z-index: 100;
    max-width: 560px;
    margin: 0 auto;
  }

  .nav-item {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.3s;
  }

  .nav-item.active {
    color: var(--accent);
    font-weight: 600;
  }

  .nav-item .icon {
    font-size: 24px;
    display: block;
    margin-bottom: 4px;
  }

  /* Result Area */
  .result-area {
    background: var(--surface);
    border-radius: 20px;
    padding: 24px;
    min-height: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid var(--border);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .main-result {
    text-align: center;
    margin: 20px 0 28px;
  }

  .main-value {
    font-family: 'Space Mono', monospace;
    font-size: 68px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent2);
    text-shadow: 0 4px 15px rgba(0,196,180,0.3);
  }

  .main-unit {
    font-size: 21px;
    color: var(--muted);
  }

  .result-label {
    font-size: 14.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 24px;
  }

  .stat-card {
    background: var(--surface2);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .stat-card .label {
    font-size: 13.5px;
    color: var(--muted);
  }

  .stat-card .value {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    margin-top: 6px;
    color: var(--accent);
  }

  /* Button */
  .btn {
    width: 100%;
    margin-top: 28px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #00c4b4);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--glow);
    transition: all 0.3s;
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 30px rgba(0,136,255,0.5);
  }

  .error-msg, .warn-box {
    margin-top: 16px;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
  }

  .error-msg {
    background: #fee2e2;
    color: #ef4444;
    display: none;
  }

  .warn-box {
    background: #fef3c7;
    color: #d97706;
    display: none;
  }

  @media (max-width: 480px) {
    .main-value { font-size: 54px; }
    .result-area { padding: 20px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <span class="icon">⚡</span>
    <h1>EV WALL CHARGER</h1>
    <p>คำนวณการชาร์จรถไฟฟ้า</p>
  </div>

  <!-- Fixed Parameters -->
  <div class="fixed-card">
    <div class="card-title">📍 ข้อมูลรถของคุณ</div>
    
    <div class="field">
      <label>ความจุแบตเตอรี่</label>
      <div class="input-wrap">
        <input type="number" id="capacity" value="60">
        <span class="suffix">kWh</span>
      </div>
    </div>

    <div class="field">
      <label>ระดับแบตปัจจุบัน</label>
      <div class="slider-container">
        <input type="range" id="currentPct" min="0" max="100" value="35">
        <span class="pct-val" id="currentPctVal">35%</span>
      </div>
    </div>

    <div class="field">
      <label>เป้าหมายชาร์จ</label>
      <div class="input-wrap">
        <input type="number" id="targetPct" value="85">
        <span class="suffix">%</span>
      </div>
    </div>

    <div class="field">
      <label>เวลาเริ่มชาร์จ</label>
      <div class="input-wrap">
        <input type="time" id="startTime" value="22:00">
      </div>
    </div>
  </div>

  <!-- Result Area -->
  <div class="result-area" id="resultArea">

    <!-- Tab กระแส -->
    <div class="tab-content active" id="tab-current">
      <div class="main-result">
        <div class="result-label">กระแสไฟฟ้าขั้นต่ำ</div>
        <div class="main-value" id="ampValue">—</div>
        <div class="main-unit">แอมแปร์ (A)</div>
      </div>
      
      <div class="field">
        <label>ต้องการเสร็จภายใน</label>
        <div class="input-wrap">
          <input type="time" id="desiredEndTime" value="06:00">
        </div>
      </div>
      
      <div class="field">
        <label>ประสิทธิภาพการชาร์จ</label>
        <div class="input-wrap">
          <input type="number" id="effCurrent" value="90">
          <span class="suffix">%</span>
        </div>
      </div>

      <button class="btn" onclick="calculateCurrent()">คำนวณกระแส</button>
    </div>

    <!-- Tab เวลา -->
    <div class="tab-content" id="tab-time">
      <div class="main-result">
        <div class="result-label">ระยะเวลาชาร์จ</div>
        <div class="main-value" id="timeValue">—</div>
        <div class="main-unit" id="timeUnit">ชั่วโมง</div>
      </div>
      
      <div class="field">
        <label>กระแสที่ตั้งไว้</label>
        <div class="input-wrap">
          <input type="number" id="setAmps" value="32">
          <span class="suffix">A</span>
        </div>
      </div>
      
      <div class="field">
        <label>ประสิทธิภาพการชาร์จ</label>
        <div class="input-wrap">
          <input type="number" id="effTime" value="90">
          <span class="suffix">%</span>
        </div>
      </div>

      <button class="btn" onclick="calculateTime()">คำนวณเวลา</button>
    </div>

    <!-- Tab ประสิทธิภาพ -->
    <div class="tab-content" id="tab-efficiency">
      <div class="main-result">
        <div class="result-label">ประสิทธิภาพการชาร์จ</div>
        <div class="main-value" id="effValue">—</div>
        <div class="main-unit">%</div>
      </div>
      
      <div class="field">
        <label>กระแสที่ตั้งไว้</label>
        <div class="input-wrap">
          <input type="number" id="setAmpsEff" value="32">
          <span class="suffix">A</span>
        </div>
      </div>
      
      <div class="field">
        <label>ระยะเวลาชาร์จ</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="input-wrap">
            <input type="number" id="hours" value="6">
            <span class="suffix">ชม.</span>
          </div>
          <div class="input-wrap">
            <input type="number" id="minutes" value="30">
            <span class="suffix">นาที</span>
          </div>
        </div>
      </div>

      <button class="btn" onclick="calculateEfficiency()">คำนวณประสิทธิภาพ</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="warn-box" id="warnBox"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">พลังงานที่ต้องชาร์จ</div>
        <div class="value" id="energyStat">— kWh</div>
      </div>
      <div class="stat-card">
        <div class="label">กำลังไฟ</div>
        <div class="value" id="powerStat">— kW</div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active" data-tab="current">
    <span class="icon">⚡</span>
    กระแส
  </div>
  <div class="nav-item" data-tab="time">
    <span class="icon">⏱</span>
    เวลา
  </div>
  <div class="nav-item" data-tab="efficiency">
    <span class="icon">📊</span>
    ประสิทธิภาพ
  </div>
</div>

<script>
  // Tab Switching (Bottom Nav)
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${item.dataset.tab}`).classList.add('active');
    });
  });

  // Slider
  const currentSlider = document.getElementById('currentPct');
  const currentVal = document.getElementById('currentPctVal');
  currentSlider.addEventListener('input', () => {
    currentVal.textContent = currentSlider.value + '%';
  });

  function getEnergyNeeded() {
    const capacity = parseFloat(document.getElementById('capacity').value) || 60;
    const current = parseInt(currentSlider.value);
    const target = parseFloat(document.getElementById('targetPct').value) || 85;
    return Math.max(0, capacity * (target - current) / 100);
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 4000);
  }

  function parseTime(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function calculateCurrent() {
    const energy = getEnergyNeeded();
    if (energy <= 0) return showError("กรุณาตรวจสอบระดับแบตเตอรี่");

    const startMin = parseTime(document.getElementById('startTime').value);
    let endMin = parseTime(document.getElementById('desiredEndTime').value);
    if (endMin <= startMin) endMin += 1440;
    const durationHrs = (endMin - startMin) / 60;

    const eff = parseFloat(document.getElementById('effCurrent').value) / 100 || 0.9;
    const powerKW = (energy / eff) / durationHrs;
    const amps = Math.ceil((powerKW * 1000) / 220);

    document.getElementById('ampValue').textContent = amps;
    document.getElementById('energyStat').textContent = energy.toFixed(1) + " kWh";
    document.getElementById('powerStat').textContent = powerKW.toFixed(1) + " kW";

    const warn = document.getElementById('warnBox');
    warn.textContent = amps > 32 ? "⚠️ ควรใช้ Wall Charger" : "✅ ใช้งานได้กับระบบบ้านทั่วไป";
    warn.style.display = 'block';
  }

  function calculateTime() {
    const energy = getEnergyNeeded();
    const amps = parseInt(document.getElementById('setAmps').value) || 32;
    const eff = parseFloat(document.getElementById('effTime').value) / 100 || 0.9;
    const powerKW = (amps * 220) / 1000;
    const energyWall = energy / eff;
    let hours = energyWall / powerKW;
    
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    
    document.getElementById('timeValue').textContent = `${h}:${m.toString().padStart(2,'0')}`;
    document.getElementById('timeUnit').textContent = "ชั่วโมง";
    document.getElementById('energyStat').textContent = energy.toFixed(1) + " kWh";
    document.getElementById('powerStat').textContent = powerKW.toFixed(1) + " kW";
  }

  function calculateEfficiency() {
    const energy = getEnergyNeeded();
    const amps = parseInt(document.getElementById('setAmpsEff').value) || 32;
    const hours = parseFloat(document.getElementById('hours').value) || 6;
    const mins = parseFloat(document.getElementById('minutes').value) || 0;
    const totalHours = hours + mins/60;

    const powerKW = (amps * 220) / 1000;
    const energyWall = powerKW * totalHours;
    const eff = Math.min(98, Math.round((energy / energyWall) * 100));

    document.getElementById('effValue').textContent = eff;
    document.getElementById('energyStat').textContent = energy.toFixed(1) + " kWh";
    document.getElementById('powerStat').textContent = powerKW.toFixed(1) + " kW";
  }

  // Initial load
  setTimeout(() => calculateCurrent(), 500);
</script>
</body>
</html>
