<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Wall Charger</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&amp;family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1219;
    --surface: #1a1f2e;
    --surface2: #242b3d;
    --border: #2e374f;
    --accent: #00b4ff;
    --accent2: #00ff9d;
    --text: #f0f4f8;
    --muted: #8a94a6;
    --glow: 0 0 25px rgba(0,180,255,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }

  .container {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 12px;
  }

  .header .icon {
    font-size: 56px;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 18px rgba(0,180,255,0.7));
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    color: var(--accent);
    letter-spacing: 4px;
    font-weight: 700;
  }

  .header p {
    color: var(--muted);
    font-size: 15px;
  }

  /* Fixed Card */
  .fixed-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 26px;
    margin-bottom: 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .card-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 14.5px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap input, .input-wrap select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 15px 16px;
    color: var(--text);
    font-size: 17px;
    font-family: 'Space Mono', monospace;
    outline: none;
    transition: all 0.3s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .input-wrap .suffix {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }

  /* Slider */
  .slider-container {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    height: 6px;
    border-radius: 999px;
  }

  .pct-val {
    font-family: 'Space Mono', monospace;
    font-size: 19px;
    color: var(--accent2);
    font-weight: 600;
  }

  /* Tab Menu */
  .tab-menu {
    display: flex;
    background: var(--surface);
    border-radius: 18px;
    padding: 6px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .tab {
    flex: 1;
    padding: 14px 10px;
    text-align: center;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    color: var(--muted);
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), #00ffbb);
    color: #0a0f1e;
    box-shadow: var(--glow);
  }

  /* Result Area */
  .result-area {
    background: var(--surface);
    border-radius: 24px;
    padding: 28px;
    min-height: 460px;
    border: 1px solid var(--border);
    box-shadow: 0 15px 45px rgba(0,0,0,0.35);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
    animation: fadeInUp 0.5s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .main-result {
    text-align: center;
    margin: 24px 0 32px;
  }

  .main-value {
    font-family: 'Space Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent2);
    text-shadow: 0 0 35px rgba(0,255,157,0.5);
  }

  .main-unit {
    font-size: 21px;
    color: var(--muted);
    margin-top: 4px;
  }

  .result-label {
    font-size: 14.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 28px;
  }

  .stat-card {
    background: var(--surface2);
    border-radius: 18px;
    padding: 18px 14px;
    text-align: center;
    border: 1px solid rgba(0,180,255,0.15);
  }

  .stat-card .label {
    font-size: 13px;
    color: var(--muted);
  }

  .stat-card .value {
    font-family: 'Space Mono', monospace;
    font-size: 23px;
    margin-top: 6px;
    color: var(--accent2);
  }

  /* Button */
  .btn {
    width: 100%;
    margin-top: 32px;
    padding: 17px;
    background: linear-gradient(135deg, #0088ff, var(--accent));
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 17.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: var(--glow);
    transition: all 0.3s;
  }

  .btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 40px rgba(0,180,255,0.6);
  }

  .error-msg, .warn-box {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
  }

  .error-msg {
    background: rgba(255,80,80,0.12);
    border: 1px solid rgba(255,100,100,0.4);
    color: #ff8888;
    display: none;
  }

  .warn-box {
    background: rgba(255,200,80,0.12);
    border: 1px solid rgba(255,180,60,0.4);
    color: #ffdd88;
    display: none;
  }

  @media (max-width: 480px) {
    .main-value { font-size: 58px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <span class="icon">⚡</span>
    <h1>EV WALL CHARGER</h1>
    <p>เครื่องมือคำนวณชาร์จรถยนต์ไฟฟ้า</p>
  </div>

  <!-- Fixed Parameters -->
  <div class="fixed-card">
    <div class="card-title">📍 ข้อมูลรถของคุณ</div>
    
    <div class="field">
      <label>ความจุแบตเตอรี่</label>
      <div class="input-wrap">
        <input type="number" id="capacity" value="60" placeholder="60">
        <span class="suffix">kWh</span>
      </div>
    </div>

    <div class="field">
      <label>ระดับแบตปัจจุบัน</label>
      <div class="slider-container">
        <input type="range" id="currentPct" min="0" max="100" value="35">
        <span class="pct-val" id="currentPctVal">35%</span>
      </div>
    </div>

    <div class="field">
      <label>เป้าหมายการชาร์จ</label>
      <div class="input-wrap">
        <input type="number" id="targetPct" value="85" min="10" max="100">
        <span class="suffix">%</span>
      </div>
    </div>

    <div class="field">
      <label>เวลาเริ่มชาร์จ</label>
      <div class="input-wrap">
        <input type="time" id="startTime" value="22:00">
      </div>
    </div>
  </div>

  <!-- Tab Menu -->
  <div class="tab-menu">
    <div class="tab active" data-tab="current">⚡ กระแส</div>
    <div class="tab" data-tab="time">⏱ เวลา</div>
    <div class="tab" data-tab="efficiency">📊 ประสิทธิภาพ</div>
  </div>

  <!-- Result Area -->
  <div class="result-area">

    <!-- Tab กระแส -->
    <div class="tab-content active" id="tab-current">
      <div class="main-result">
        <div class="result-label">กระแสไฟฟ้าขั้นต่ำที่ต้องการ</div>
        <div class="main-value" id="ampValue">—</div>
        <div class="main-unit">แอมแปร์ (A)</div>
      </div>
      
      <div class="field">
        <label>ต้องการชาร์จเสร็จภายใน</label>
        <div class="input-wrap">
          <input type="time" id="desiredEndTime" value="06:00">
        </div>
      </div>
      
      <div class="field">
        <label>ประสิทธิภาพการชาร์จ</label>
        <div class="input-wrap">
          <input type="number" id="effCurrent" value="90" min="70" max="98">
          <span class="suffix">%</span>
        </div>
      </div>

      <button class="btn" onclick="calculateCurrent()">คำนวณกระแส</button>
    </div>

    <!-- Tab เวลา -->
    <div class="tab-content" id="tab-time">
      <div class="main-result">
        <div class="result-label">ระยะเวลาที่ใช้ในการชาร์จ</div>
        <div class="main-value" id="timeValue">—</div>
        <div class="main-unit" id="timeUnit">ชั่วโมง</div>
      </div>
      
      <div class="field">
        <label>กระแสที่ตั้งไว้</label>
        <div class="input-wrap">
          <input type="number" id="setAmps" value="32" min="6" max="80">
          <span class="suffix">A</span>
        </div>
      </div>
      
      <div class="field">
        <label>ประสิทธิภาพการชาร์จ</label>
        <div class="input-wrap">
          <input type="number" id="effTime" value="90" min="70" max="98">
          <span class="suffix">%</span>
        </div>
      </div>

      <button class="btn" onclick="calculateTime()">คำนวณเวลา</button>
    </div>

    <!-- Tab ประสิทธิภาพ -->
    <div class="tab-content" id="tab-efficiency">
      <div class="main-result">
        <div class="result-label">ประสิทธิภาพการชาร์จโดยประมาณ</div>
        <div class="main-value" id="effValue">—</div>
        <div class="main-unit">%</div>
      </div>
      
      <div class="field">
        <label>กระแสที่ตั้งไว้</label>
        <div class="input-wrap">
          <input type="number" id="setAmpsEff" value="32">
          <span class="suffix">A</span>
        </div>
      </div>
      
      <div class="field">
        <label>ระยะเวลาชาร์จ</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="input-wrap">
            <input type="number" id="hours" value="6">
            <span class="suffix">ชม.</span>
          </div>
          <div class="input-wrap">
            <input type="number" id="minutes" value="30">
            <span class="suffix">นาที</span>
          </div>
        </div>
      </div>

      <button class="btn" onclick="calculateEfficiency()">คำนวณประสิทธิภาพ</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="warn-box" id="warnBox"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">พลังงานที่ต้องชาร์จ</div>
        <div class="value" id="energyStat">— kWh</div>
      </div>
      <div class="stat-card">
        <div class="label">กำลังไฟ</div>
        <div class="value" id="powerStat">— kW</div>
      </div>
    </div>
  </div>
</div>

<script>
  // Tab Control
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // Slider
  const currentSlider = document.getElementById('currentPct');
  const currentVal = document.getElementById('currentPctVal');
  currentSlider.addEventListener('input', () => currentVal.textContent = currentSlider.value + '%');

  function getEnergyNeeded() {
    const capacity = parseFloat(document.getElementById('capacity').value) || 60;
    const current = parseInt(currentSlider.value);
    const target = parseFloat(document.getElementById('targetPct').value) || 85;
    return Math.max(0, capacity * (target - current) / 100);
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 4500);
  }

  function parseTime(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function calculateCurrent() {
    const energy = getEnergyNeeded();
    if (energy <= 0) return showError("กรุณาตรวจสอบระดับแบตเตอรี่");

    const startMin = parseTime(document.getElementById('startTime').value);
    let endMin = parseTime(document.getElementById('desiredEndTime').value);
    if (endMin <= startMin) endMin += 1440;
    const durationHrs = (endMin - startMin) / 60;

    const eff = parseFloat(document.getElementById('effCurrent').value) / 100 || 0.9;
    const powerKW = (energy / eff) / durationHrs;
    const amps = Math.ceil((powerKW * 1000) / 220);

    document.getElementById('ampValue').textContent = amps;
    document.getElementById('energyStat').textContent = energy.toFixed(1) + " kWh";
    document.getElementById('powerStat').textContent = powerKW.toFixed(1) + " kW";

    const warn = document.getElementById('warnBox');
    warn.textContent = amps > 32 ? "⚠️ ควรใช้ Wall Charger" : "✅ ใช้งานได้กับระบบบ้านทั่วไป";
    warn.style.display = 'block';
  }

  function calculateTime() {
    const energy = getEnergyNeeded();
    const amps = parseFloat(document.getElementById('setAmps').value) || 32;
    const eff = parseFloat(document.getElementById('effTime').value) / 100 || 0.9;
    const powerKW = (amps * 220) / 1000;
    const energyWall = energy / eff;
    const hours = energyWall / powerKW;
    
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    
    document.getElementById('timeValue').textContent = `${h}:${m.toString().padStart(2,'0')}`;
    document.getElementById('energyStat').textContent = energy.toFixed(1) + " kWh";
    document.getElementById('powerStat').textContent = powerKW.toFixed(1) + " kW";
  }

  function calculateEfficiency() {
    const energy = getEnergyNeeded();
    const amps = parseFloat(document.getElementById('setAmpsEff').value) || 32;
    const hours = parseFloat(document.getElementById('hours').value) || 6;
    const mins = parseFloat(document.getElementById('minutes').value) || 0;
    const totalHours = hours + mins/60;

    const powerKW = (amps * 220) / 1000;
    const energyWall = powerKW * totalHours;
    const eff = Math.min(98, Math.round((energy / energyWall) * 100));

    document.getElementById('effValue').textContent = eff;
    document.getElementById('energyStat').textContent = energy.toFixed(1) + " kWh";
    document.getElementById('powerStat').textContent = powerKW.toFixed(1) + " kW";
  }

  // Initial Calculation
  setTimeout(() => calculateCurrent(), 400);
</script>
</body>
</html>
